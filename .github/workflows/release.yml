name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: false
        type: string

env:
  NODE_VERSION: '24'

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        run: yarn install --frozen-lockfile
      - name: UTF-8 check
        run: yarn check:utf8
      - name: Dist Windows
        run: yarn dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.exe
          retention-days: 7

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: macos-latest
            name: Apple Silicon
          - arch: x64
            os: macos-latest
            name: Intel
    runs-on: ${{ matrix.os }}
    name: Build macOS (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        run: yarn install --frozen-lockfile
        env:
          npm_config_arch: ${{ matrix.arch }}
      - name: Install sharp (x64 only)
        if: matrix.arch == 'x64'
        run: |
          npm install --no-save --ignore-scripts --force @img/sharp-darwin-x64 @img/sharp-libvips-darwin-x64
      - name: UTF-8 check
        run: yarn check:utf8
      - name: Dist macOS
        run: yarn dist:mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg
          retention-days: 7

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            name: x64
          - arch: arm64
            name: ARM64
    runs-on: ubuntu-latest
    name: Build Linux (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        run: yarn install --frozen-lockfile
        env:
          npm_config_arch: ${{ matrix.arch }}
      - name: Install sharp (arm64 only)
        if: matrix.arch == 'arm64'
        run: |
          npm install --no-save --ignore-scripts --force @img/sharp-linux-arm64 @img/sharp-libvips-linux-arm64
      - name: UTF-8 check
        run: yarn check:utf8
      - name: Dist Linux
        run: yarn dist:linux --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*.AppImage
          retention-days: 7

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect files
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) -exec mv {} dist/ \;
      - name: Show release files
        run: |
          echo "===== Files to release ====="
          ls -la dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ToonFlow ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}